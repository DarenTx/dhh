<main class="magic-link-container" aria-labelledby="magic-link-heading">
  @if (submitted()) {
    <section class="card confirmation">
      <h1 id="magic-link-heading">Check your inbox</h1>
      <p>We've sent a sign-in link to your email address. Click the link to sign in.</p>
      <a routerLink="/login" class="link-btn">Back to sign in</a>
    </section>
  } @else {
    <section class="card">
      <h1 id="magic-link-heading">Sign in with Email</h1>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
        <div class="field">
          <label for="email">Email address</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            autocomplete="email"
            [attr.aria-invalid]="emailErrorMessage ? 'true' : null"
            aria-describedby="email-error"
          />
          <span id="email-error" class="field-error" role="alert">
            {{ emailErrorMessage }}
          </span>
        </div>

        @if (serverError()) {
          <p class="server-error" role="alert">{{ serverError() }}</p>
        }

        <button type="submit" class="btn btn-primary" [disabled]="submitting()">
          @if (submitting()) {
            <span class="btn-spinner"></span>
            Sending…
          } @else {
            Send sign-in link
          }
        </button>
      </form>

      <a routerLink="/login" class="link-btn back-link">← Back to sign in</a>
    </section>
  }
</main>
